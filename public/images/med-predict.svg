<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#15181d"/>
  <g font-family="monospace" fill="#e9e6db">
    <text x="140" y="150" font-size="20" fill="#4b5058">$ symptoms.input()</text>
    <rect x="140" y="175" width="500" height="40" rx="6" fill="#1c2027" stroke="#2a2f38"/>
    <text x="160" y="202" font-size="16">fever, cough, fatigue...</text>

    <text x="140" y="270" font-size="20" fill="#4b5058">$ model.predict()</text>
    <polyline points="140,320 300,260 460,340 620,220 780,300" fill="none" stroke="#3b6fd1" stroke-width="3"/>
    <circle cx="300" cy="260" r="5" fill="#3b6fd1"/>
    <circle cx="460" cy="340" r="5" fill="#3b6fd1"/>
    <circle cx="620" cy="220" r="5" fill="#3b6fd1"/>

    <rect x="140" y="400" width="700" height="80" rx="8" fill="#1c2027" stroke="#2f9e6e"/>
    <text x="170" y="435" font-size="18" fill="#2f9e6e">Likely condition: Seasonal Flu</text>
    <text x="170" y="460" font-size="14" fill="#6b7078">confidence: 0.82 — consult a doctor</text>
  </g>
</svg>
